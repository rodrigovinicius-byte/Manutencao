                </div>
                <div>
                    <h1 id="headerTitle" class="font-bold text-base">Checklist de Manutenção</h1>
                    <p class="text-[10px] text-slate-400">Grupo TBX · Sincronizado com Google Sheets</p>
                </div>
            </div>
            <button onclick="toggleConfigModal(true)" class="bg-slate-800 border border-slate-700 text-xs py-2 px-4 rounded-lg hover:bg-slate-700 transition-all">Configurar Conexão</button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6">
        <div id="apiStatusAlert" class="mb-6 p-4 rounded-xl border flex items-center justify-between text-xs bg-amber-50 border-amber-200 text-amber-800">
            <span>Atenção: Configure a URL da sua API para começar.</span>
        </div>

        <div id="loadingIndicator" class="hidden text-center py-12"><i class="fa-solid fa-circle-notch animate-spin text-3xl text-blue-600"></i></div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Setor</label>
                <select id="setorFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border rounded-xl px-3 py-2.5 text-sm font-medium focus:outline-none focus:border-blue-500"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Periodicidade</label>
                <select id="periodoFilter" onchange="filtrarDados()" class="w-full bg-slate-50 border rounded-xl px-3 py-2.5 text-sm font-medium focus:outline-none focus:border-blue-500"></select>
            </div>
        </div>

        <div id="checklistContainer" class="space-y-6"></div>

        <div class="mt-8 pt-4 border-t border-slate-200 flex justify-end">
            <button onclick="salvarChecklist()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-8 py-3 rounded-xl shadow-lg transition-all flex items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Enviar Checklist
            </button>
        </div>
    </main>

    <div id="configModal" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-xl">
            <h3 class="font-bold mb-4">Conexão do Google Sheets</h3>
            <input type="text" id="apiInputUrl" class="w-full border rounded-xl p-3 mb-4 text-xs focus:outline-none focus:border-blue-500" placeholder="Cole a URL do Apps Script aqui">
            <div class="flex gap-2">
                <button onclick="toggleConfigModal(false)" class="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-semibold">Cancelar</button>
                <button onclick="salvarConfigUrl()" class="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-semibold">Salvar Link</button>
            </div>
        </div>
    </div>

    <script>
        let originalDatabase = [];
        let API_URL = localStorage.getItem("checklist_google_api_url") || "";

        window.onload = () => {
            if (API_URL) baixarDadosDaPlanilha();
            else toggleConfigModal(true);
        };

        async function baixarDadosDaPlanilha() {
            toggleLoading(true);
            try {
                const res = await fetch(`${API_URL}?action=carregarItens`);
                originalDatabase = await res.json();
                
                const setores = [...new Set(originalDatabase.map(i => i.setor).filter(Boolean))];
                const periodos = [...new Set(originalDatabase.map(i => i.periodicidade).filter(Boolean))];
                
                document.getElementById('setorFilter').innerHTML = setores.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('periodoFilter').innerHTML = periodos.map(p => `<option value="${p}">${p}</option>`).join('');
                
                filtrarDados();
            } catch (e) { alert("Erro ao carregar dados do banco."); }
            toggleLoading(false);
        }

        function filtrarDados() {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const container = document.getElementById("checklistContainer");
            container.innerHTML = "";

            if (!set || !per) return;

            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per);
            const agrupado = {};
            filtrados.forEach(d => {
                if(!agrupado[d.maquina]) agrupado[d.maquina] = [];
                agrupado[d.maquina].push(d);
            });

            for (let maq in agrupado) {
                let html = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                        <div class="bg-slate-800 text-white px-5 py-3.5 font-bold flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-bold tracking-wide">${maq}</span>
                                <button onclick="imprimirFolhaPapel('${maq.replace(/'/g, "\\'")}')" class="bg-slate-700 hover:bg-slate-600 text-white text-[11px] font-medium py-1 px-3 rounded-lg transition-all flex items-center gap-1 shadow-sm">
                                    <i class="fa-solid fa-print"></i> Imprimir p/ Papel
                                </button>
                            </div>
                            <span class="text-[11px] font-bold bg-red-100 text-red-700 px-2.5 py-1 rounded-full shadow-sm">Nunca feito</span>
                        </div>
                        <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-400 tracking-wider border-b border-slate-100">
                                <tr>
                                    <th class="p-4 pl-5">Item / Instrução</th>
                                    <th class="p-4 w-48">Operador</th>
                                    <th class="p-4 w-32">Status</th>
                                    <th class="p-4">OBS</th>
                                    <th class="p-4 pr-5 text-center w-36">Ação</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">`;
                agrupado[maq].forEach(item => {
                    html += `
                        <tr class="row-check hover:bg-slate-50/20 transition-all" data-maquina="${maq}" data-item="${item.item}">
                            <td class="p-4 pl-5 text-xs font-semibold text-slate-800">
                                <div class="item-main-text">${item.item}</div>
                                ${item.obs ? `<div class="mt-1.5 text-[11px] text-blue-700 italic bg-blue-50/80 px-2.5 py-1 rounded-lg font-medium w-fit">Obs: ${item.obs}</div>` : ''}
                            </td>
                            <td class="p-4"><input type="text" class="operador-inp w-full border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-blue-500" placeholder="Nome"></td>
                            <td class="p-4">
                                <select class="status-sel w-full bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs font-medium focus:outline-none focus:border-blue-500">
                                    <option value="OK">OK</option>
                                    <option value="Problema">Problema</option>
                                </select>
                            </td>
                            <td class="p-4"><input type="text" class="obs-inp w-full border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-blue-500" placeholder="Descreva problemas..."></td>
                            <td class="p-4 pr-5 text-center">
                                <button onclick="registrarItemIndividualChecklist(this)" class="registrar-btn w-full bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded-xl flex items-center justify-center gap-1 shadow-sm transition-all">
                                    <i class="fa-solid fa-paper-plane text-[10px]"></i> Registrar
                                </button>
                            </td>
                        </tr>`;
                });
                html += `</tbody></table></div></div>`;
                container.innerHTML += html;
            }
        }

        function coletarDadosDaLinha(row) {
            return {
                maquina: row.getAttribute("data-maquina"),
                item: row.getAttribute("data-item"),
                setor: document.getElementById("setorFilter").value,
                periodicidade: document.getElementById("periodoFilter").value,
                status: row.querySelector(".status-sel").value,
                operador: row.querySelector(".operador-inp").value,
                obs: row.querySelector(".obs-inp").value
            };
        }

        function ehPeriodicidadeDiaria(periodicidade) {
            const normalizado = (periodicidade || "")
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            return normalizado === "diaria" || normalizado.includes("intradi");
        }

        // FUNÇÃO CORRIGIDA: Registro Individual em Tempo Real
        async function registrarItemIndividualChecklist(btn) {
            const row = btn.closest("tr");
            const op = row.querySelector(".operador-inp").value.trim();

            if (!op) { alert("Informe o nome do operador antes de registrar este item."); return; }

            const dadosItem = coletarDadosDaLinha(row);
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-[10px]"></i>`;

            try {
                const currentPer = document.getElementById("periodoFilter").value;
                
                // Envia como ARRAY PLANO para casar com o Apps Script nativo da sua planilha
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify([dadosItem])
                });

                if (ehPeriodicidadeDiaria(currentPer)) {
                    const agora = new Date();
                    const hora = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    
                    let txtCell = row.querySelector("td");
                    let notaExistente = txtCell.querySelector(".lbl-carimbo-time");
                    if(notaExistente) notaExistente.remove();
                    
                    let carimbo = document.createElement("div");
                    carimbo.className = "lbl-carimbo-time mt-1.5 text-[11px] text-emerald-700 font-semibold";
                    carimbo.innerHTML = `Último registro hoje: ${hora} · <span class="capitalize">${op}</span>`;
                    txtCell.appendChild(carimbo);

                    row.querySelector(".operador-inp").value = "";
                    row.querySelector(".status-sel").value = "OK";
                    row.querySelector(".obs-inp").value = "";

                    btn.disabled = false;
                    btn.className = "registrar-btn bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold py-2 px-4 rounded-xl flex items-center justify-center gap-1 shadow-sm transition-all";
                    btn.innerHTML = `<i class="fa-solid fa-arrows-rotate text-[10px]"></i> Registrar Novamente`;
                } else {
                    row.querySelectorAll("input, select").forEach(el => el.disabled = true);
                    btn.className = "w-full bg-emerald-600 text-white text-xs font-bold py-2 px-4 rounded-xl cursor-default flex items-center justify-center gap-1";
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> Registrado`;
                }
            } catch (e) {
                alert("Falha de conexão com a planilha.");
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-paper-plane text-[10px]"></i> Registrar`;
            }
        }

        async function salvarChecklist() {
            const rows = document.querySelectorAll(".row-check");
            if (rows.length === 0) { alert("Nenhum item pendente."); return; }
            
            const payload = Array.from(rows).map(r => coletarDadosDaLinha(r));

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(payload)
                });
                alert("Checklist completo enviado com sucesso!");
                baixarDadosDaPlanilha();
            } catch(e) { alert("Erro ao enviar."); }
        }

        // ================= IMPRESSÃO MATRIZ DE PAPEL ADAPTÁVEL =================
        function imprimirFolhaPapel(maquina) {
            const set = document.getElementById("setorFilter").value;
            const per = document.getElementById("periodoFilter").value;
            const filtrados = originalDatabase.filter(x => x.setor === set && x.periodicidade === per && x.maquina === maquina);
            
            const periodoNorm = (per || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
            
            let cabecalhosColunas = [];
            let tituloLinhaDatas = "Datas";
            let diasIntervalo = 0;
            let numColunas = 4;

            if (periodoNorm.includes("diari") || periodoNorm.includes("intradi")) {
                tituloLinhaDatas = "Dias da Semana";
                diasIntervalo = 1;
                numColunas = 7;
            } else if (periodoNorm.includes("semanal")) {
                tituloLinhaDatas = "Datas (Semanal)";
                diasIntervalo = 7;
                numColunas = 4;
            } else if (periodoNorm.includes("quinzenal")) {
                tituloLinhaDatas = "Datas (Quinzenal)";
                diasIntervalo = 15;
                numColunas = 4;
            } else if (periodoNorm.includes("mensal")) {
                tituloLinhaDatas = "Datas (Mensal)";
                diasIntervalo = 30;
                numColunas = 4;
            } else {
                tituloLinhaDatas = "Controle";
                diasIntervalo = 0;
                numColunas = 5;
            }

            for (let i = 0; i < numColunas; i++) {
                let d = new Date();
                if (diasIntervalo > 0) {
                    d.setDate(d.getDate() + (i * diasIntervalo));
                    let dataFormatada = d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
                    cabecalhosColunas.push(dataFormatada);
                } else {
                    cabecalhosColunas.push(`Col ${i + 1}`);
                }
            }
            
            let printWindow = window.open('', '_blank');
            let htmlRows = '';
            
            filtrados.forEach(item => {
                htmlRows += `
                    <tr><td colspan="${1 + numColunas}" style="background-color: #0f172a; height: 6px; border: none;"></td></tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px; text-transform: uppercase; width: 18%;">Item</td>
                        <td colspan="${numColunas}" style="border: 1px solid #cbd5e1; padding: 6px; font-weight: 500;">
                            <div style="display: flex; justify-content: space-between; align-items: center; font-size: 11px;">
                                <span>${item.item}</span>
                                <span style="font-size: 10px; color: #475569; font-weight: bold; background-color: #f1f5f9; padding: 2px 6px; border-radius: 4px;">Setor: ${set}</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">Operador / Manutentor</td>
                        ${Array(numColunas).fill(`<td style="border: 1px solid #cbd5e1; padding: 6px;"></td>`).join('')}
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">Status</td>
                        ${Array(numColunas).fill(`
                            <td style="border: 1px solid #cbd5e1; padding: 5px; font-size: 10px;">
                                <div style="display: flex; align-items: center; justify-content: flex-start; margin-bottom: 4px;">
                                    <div style="width: 11px; height: 11px; border: 1px solid #475569; display: inline-block; margin-right: 5px;"></div>
                                    <span>OK</span>
                                </div>
                                <div style="display: flex; align-items: center; justify-content: flex-start;">
                                    <div style="width: 11px; height: 11px; border: 1px solid #475569; display: inline-block; margin-right: 5px;"></div>
                                    <span>Problema</span>
                                </div>
                            </td>
                        `).join('')}
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">OBS (Instrução):</td>
                        <td colspan="${numColunas}" style="border: 1px solid #cbd5e1; padding: 6px; color: #1e40af; font-style: italic;">${item.obs || '—'}</td>
                    </tr>
                    <tr>
                        <td style="background-color: #f8fafc; font-weight: bold; border: 1px solid #cbd5e1; padding: 6px;">Descrição / Problema:</td>
                        ${Array(numColunas).fill(`<td style="border: 1px solid #cbd5e1; padding: 6px; height: 30px;"></td>`).join('')}
                    </tr>`;
            });

            let headerDatasHtml = cabecalhosColunas.map(cab => `<td class="date-value" style="width: ${82 / numColunas}%; font-size: 11px;">${cab}</td>`).join('');

            printWindow.document.write(`
                <html>
                <head>
                    <title>Checklist Impresso - ${maquina}</title>
                    <style>
                        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 10px; color: #0f172a; }
                        table { width: 100%; border-collapse: collapse; font-size: 11px; }
                        .main-header { background-color: #0f172a; color: white; font-weight: bold; padding: 8px; border: 1px solid #0f172a; text-transform: uppercase; font-size: 10px; }
                        .value-header { background-color: #f1f5f9; color: #0f172a; font-weight: bold; font-size: 13px; text-align: center; border: 1px solid #cbd5e1; padding: 6px; text-transform: uppercase; }
                        .date-header { background-color: #0f172a; color: white; font-weight: bold; border: 1px solid #0f172a; padding: 6px; text-transform: uppercase; font-size: 10px; }
                        .date-value { background-color: white; color: #0f172a; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; padding: 6px; }
                        @media print { body { margin: 0; } tr { page-break-inside: avoid; } }
                    </style>
                </head>
                <body>
                    <table>
